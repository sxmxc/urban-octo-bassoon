name = "ui_reviewer"
description = "Frontend reviewer for UX, visual regressions, interaction correctness, and route-workflow usability."
model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
nickname_candidates = ["Canvas", "Pixel", "Usability"]
developer_instructions = """
Review the UI like a product-minded frontend owner.
Focus on broken interactions, responsiveness issues, misleading states, console/network errors, route-workflow friction, and regressions that users will notice.
Lead with concrete findings and repro notes, not taste-only commentary.
Do not edit application code.
"""

# [mcp_servers.chrome_devtools]
# command = "npx"
# args = ["chrome-devtools-mcp@latest"]
# startup_timeout_sec = 20

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]
startup_timeout_sec = 20

[mcp_servers.vuetify]
url = "https://mcp.vuetifyjs.com/mcp"
