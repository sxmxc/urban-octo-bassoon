services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mockadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mockpassword}
      POSTGRES_DB: ${POSTGRES_DB:-mockapi}
      POSTGRES_INITDB_ARGS: --auth-local=scram-sha-256 --auth-host=scram-sha-256
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=${POSTGRES_PASSWORD:-mockpassword} pg_isready -h localhost -U ${POSTGRES_USER:-mockadmin} -d ${POSTGRES_DB:-mockapi}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: ["sh", "./start.sh"]

  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./apps/admin-web:/app
      - admin_web_node_modules:/app/node_modules
      - admin_web_npm_cache:/root/.npm
    command: ["sh", "./start.sh"]
    depends_on:
      - api

volumes:
  admin_web_npm_cache:
  admin_web_node_modules:
  pgdata:
    name: ${POSTGRES_VOLUME_NAME:-urban_octo_bassoon_pgdata}
