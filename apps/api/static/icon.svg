<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img">
  <defs>
    <linearGradient id="bg" x1="12" y1="12" x2="116" y2="116">
      <stop offset="0" stop-color="#0A0E12"></stop>
      <stop offset="1" stop-color="#151B23"></stop>
    </linearGradient>

    <linearGradient id="metal" x1="38" y1="28" x2="90" y2="96">
      <stop offset="0" stop-color="#E5E7EB"></stop>
      <stop offset="1" stop-color="#8B95A7"></stop>
    </linearGradient>

    <linearGradient id="neon" x1="56" y1="56" x2="72" y2="72">
      <stop offset="0" stop-color="#67E8F9"></stop>
      <stop offset="1" stop-color="#06B6D4"></stop>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect x="12" y="12" width="104" height="104" rx="20" fill="url(#bg)"></rect>

  <!-- frame -->
  <rect x="24" y="24" width="80" height="80" rx="10" fill="none" stroke="#2A3442" stroke-width="2"></rect>

  <!-- crossbar (NOW FULL WIDTH / SYSTEM CONNECTION) -->
  <rect x="28" y="66" width="72" height="8" rx="2" fill="url(#metal)"></rect>

  <!-- A (drawn on top, cut by crossbar visually) -->
  <path d="M44 92 L60 40 L64 30 L68 40 L84 92 L74 92 L64 58 L54 92 Z" fill="url(#metal)"></path>

  <!-- seam cuts -->
  <path d="M58 46 L54 58" stroke="#0A0E12" stroke-width="2.5" stroke-linecap="round"></path>
  <path d="M70 46 L74 58" stroke="#0A0E12" stroke-width="2.5" stroke-linecap="round"></path>

  <!-- core -->
  <rect x="58" y="58" width="12" height="12" rx="2" fill="#0D131A" stroke="#364152" stroke-width="1.5"></rect>
  <path d="M61 64 L64 61 L67 64 L64 67 Z" fill="url(#neon)"></path>

  <!-- bolts -->
  <circle cx="30" cy="30" r="2" fill="#364152"></circle>
  <circle cx="98" cy="30" r="2" fill="#364152"></circle>
  <circle cx="30" cy="98" r="2" fill="#364152"></circle>
  <circle cx="98" cy="98" r="2" fill="#364152"></circle>
</svg>
