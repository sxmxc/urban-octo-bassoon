name: Container Images

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.id }} Image
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: api
            image_name: artificer-api
            context: apps/api
            file: apps/api/Dockerfile
          - id: studio
            image_name: artificer-studio
            context: apps/admin-web
            file: apps/admin-web/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image settings
        id: vars
        env:
          IMAGE_NAME: ${{ matrix.image_name }}
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "sbom=false" >> "$GITHUB_OUTPUT"
            echo "provenance=false" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "sbom=true" >> "$GITHUB_OUTPUT"
            echo "provenance=mode=max" >> "$GITHUB_OUTPUT"
          fi

          if printf '%s' "${GITHUB_REF}" | grep -Eq '^refs/tags/v'; then
            echo "app_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            short_sha="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
            ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr '/_' '--' | tr -cd '[:alnum:].-')"
            echo "app_version=${ref_slug}-${short_sha}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.vars.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.vars.outputs.image }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short,prefix=sha-
            type=raw,value=edge,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: runtime
          platforms: ${{ steps.vars.outputs.platforms }}
          push: ${{ steps.vars.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.app_version }}
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,scope=${{ matrix.id }},mode=max
          provenance: ${{ steps.vars.outputs.provenance }}
          sbom: ${{ steps.vars.outputs.sbom }}

      - name: Inspect published manifest
        if: steps.vars.outputs.push == 'true'
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          mkdir -p "artifacts/${{ matrix.id }}"
          first_tag="$(printf '%s\n' "$IMAGE_TAGS" | head -n1)"
          docker buildx imagetools inspect "$first_tag" --raw > "artifacts/${{ matrix.id }}/manifest.json"

      - name: Write image metadata artifact
        if: always()
        env:
          APP_VERSION: ${{ steps.vars.outputs.app_version }}
          BUILD_METADATA: ${{ steps.build.outputs.metadata }}
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_NAME: ${{ steps.vars.outputs.image }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          mkdir -p "artifacts/${{ matrix.id }}"
          printf '%s\n' "$IMAGE_NAME" > "artifacts/${{ matrix.id }}/image.txt"
          printf '%s\n' "$APP_VERSION" > "artifacts/${{ matrix.id }}/version.txt"
          printf '%s\n' "$DIGEST" > "artifacts/${{ matrix.id }}/digest.txt"
          printf '%s\n' "$IMAGE_TAGS" > "artifacts/${{ matrix.id }}/tags.txt"
          printf '%s' "$BUILD_METADATA" > "artifacts/${{ matrix.id }}/build-metadata.json"

      - name: Upload image metadata artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.id }}-image-metadata
          path: artifacts/${{ matrix.id }}
          if-no-files-found: error

      - name: Attest build provenance
        if: steps.vars.outputs.push == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.vars.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
